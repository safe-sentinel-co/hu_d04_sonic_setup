# HU_D04 termination composition (foot_pos_xyz disabled — see Apr 18 diagnosis:
# HU_D04 feet rest at z=0.156m, reference feet at ~0m, initial error ~78% of 0.2m
# threshold → 100% of episodes terminate at step 1, no learning signal).

defaults:
  - terms/anchor_pos_adaptive@_here_
  - terms/anchor_ori_full@_here_
  - terms/motion_time_out@_here_

_target_: gear_sonic.envs.manager_env.mdp.terminations.TerminationsCfg

anchor_pos:
  params:
    threshold: 0.15

anchor_ori_full:
  params:
    threshold: 0.4
